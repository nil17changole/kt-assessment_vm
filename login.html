<!DOCTYPE html>
<html>
<head>
<title>Assessment Portal</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial;
    overflow:hidden;

    background: linear-gradient(270deg, #0f172a, #1e3a8a, #4f46e5, #9333ea);
    background-size: 800% 800%;
    animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
    0% { background-position:0% 50%; }
    50% { background-position:100% 50%; }
    100% { background-position:0% 50%; }
}

/* FLOATING BUBBLES */
.bg-animation span {
    position:absolute;
    display:block;
    border-radius:50%;
    background: rgba(255,255,255,0.08);
    animation: float 12s linear infinite;
}

.bg-animation span:nth-child(1){
    width:200px;
    height:200px;
    left:10%;
    animation-duration:15s;
}
.bg-animation span:nth-child(2){
    width:300px;
    height:300px;
    left:70%;
    animation-duration:20s;
}
.bg-animation span:nth-child(3){
    width:150px;
    height:150px;
    left:40%;
    animation-duration:12s;
}

@keyframes float {
    0% { top:100%; transform:translateY(0) rotate(0deg); }
    100% { top:-200px; transform:translateY(-1000px) rotate(360deg); }
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:16px;
    width:320px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    text-align:center;
    transition: 0.4s;
    color:white;
}

.card:hover {
    transform: perspective(1000px) rotateX(5deg) scale(1.03);
}

h2 { margin-bottom:20px; }

input {
    width:80%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    outline:none;
}

button {
    width:100%;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    background:#312e81;
}
</style>

</head>

<body>

<div class="bg-animation">
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="card">
<h2>Assessment Portal</h2>

<!-- ✅ FIXED IDs -->
<input id="emp_id" placeholder="Employee ID">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<!-- ✅ INLINE LOGIN FUNCTION -->
<script>
async function login() {
  const emp_id = document.getElementById("emp_id").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!emp_id || !password) {
    alert("Please enter Employee ID and Password");
    return;
  }

  const res = await fetch('/api?action=login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ emp_id, password })
  });

  const data = await res.json();

  if (res.ok && data.success) {
    localStorage.setItem("user", JSON.stringify(data.user));
    window.location.href = "dashboard.html";
  } else {
    alert(data.error || "Invalid login");
  }
}
</script>

</body>
</html>
