<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* ===== BACKGROUND ===== */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  overflow: hidden;
}

/* ===== FLOATING CIRCLES ===== */
.circle {
  position: absolute;
  border-radius: 50%;
  filter: blur(2px);
  opacity: 0.6;
  animation: float 8s infinite ease-in-out;
}

.circle1 {
  width: 120px;
  height: 120px;
  background: #00c6ff;
  top: 10%;
  left: 15%;
}

.circle2 {
  width: 80px;
  height: 80px;
  background: #ff00cc;
  bottom: 15%;
  right: 20%;
}

.circle3 {
  width: 60px;
  height: 60px;
  background: #00ffcc;
  top: 30%;
  right: 10%;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-25px); }
  100% { transform: translateY(0px); }
}

/* ===== CARD ===== */
.login-card {
  width: 360px;
  padding: 40px 30px;
  border-radius: 20px;

  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);

  text-align: center;
  color: white;
  position: relative;
  z-index: 2;
}

/* ===== BLOB SHAPE ===== */
.login-card::before {
  content: "";
  position: absolute;
  width: 250px;
  height: 250px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  border-radius: 50%;
  top: -80px;
  left: -80px;
  z-index: -1;
  filter: blur(40px);
}

/* ===== TITLE ===== */
.login-card h2 {
  margin-bottom: 25px;
  font-weight: 600;
}

/* ===== INPUT ===== */
.input-group {
  margin-bottom: 15px;
  text-align: left;
}

.input-group input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
}

/* ===== OPTIONS ===== */
.options {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-bottom: 15px;
}

/* ===== BUTTON ===== */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #ffcc00, #ff9900);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* ===== FOOTER ===== */
.footer {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.7;
}
</style>

</head>
<body>

<!-- Floating shapes -->
<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<!-- LOGIN CARD -->
<div class="login-card">
  <h2>Login</h2>

  <div class="input-group">
    <input type="text" id="emp_id" placeholder="Enter your email">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Enter your password">
  </div>

  <div class="options">
    <label><input type="checkbox"> Remember me</label>
    <span>Forgot Password?</span>
  </div>

  <button onclick="login()">Login</button>

  <div class="footer">Don't have an account? Sign up</div>
</div>

<script>
async function login() {
  const emp_id = document.getElementById("emp_id").value;
  const password = document.getElementById("password").value;

  const res = await fetch('/api?action=login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ emp_id, password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("user", JSON.stringify(data.user));
    window.location.href = "dashboard.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
