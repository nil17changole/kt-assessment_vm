<!DOCTYPE html>
<html>
<head>
<title>Assessment Portal</title>

<link rel="stylesheet" href="assets/style.css">

<style>

/* ===== BACKGROUND GRADIENT ===== */
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial;
    overflow:hidden;

    background: linear-gradient(270deg, #0f172a, #1e3a8a, #4f46e5, #9333ea);
    background-size: 800% 800%;
    animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
    0% { background-position:0% 50%; }
    50% { background-position:100% 50%; }
    100% { background-position:0% 50%; }
}

/* ===== ORBIT EFFECT ===== */
.orbit {
  position:absolute;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:50%;
  animation: rotate 25s linear infinite;
}

.orbit1 { width:300px; height:300px; }
.orbit2 { width:500px; height:500px; animation-duration:35s; }
.orbit3 { width:700px; height:700px; animation-duration:45s; }

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== GLASS CARD ===== */
.login-card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    padding:40px;
    border-radius:16px;
    width:340px;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
    text-align:center;
    color:white;
    position:relative;
    z-index:2;
}

.login-card h2 {
    margin-bottom:20px;
}

/* INPUTS */
.login-card input {
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:14px;
}

/* BUTTON */
.login-card button {
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

.login-card button:hover {
    transform: translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<!-- ORBITS -->
<div class="orbit orbit1"></div>
<div class="orbit orbit2"></div>
<div class="orbit orbit3"></div>

<!-- LOGIN -->
<div class="login-card">
  <h2>Assessment Portal</h2>

  <input id="id" placeholder="Employee ID">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script src="script.js"></script>

</body>
</html>
