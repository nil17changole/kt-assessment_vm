<!DOCTYPE html>
<html>
<head>
<title>Assessment Portal</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial;
    overflow:hidden;

    /* NEW MODERN ANIMATION */
    background: linear-gradient(270deg, #0f172a, #1e3a8a, #4f46e5, #9333ea);
    background-size: 800% 800%;
    animation: gradientMove 12s ease infinite;
}

/* Smooth gradient animation */
@keyframes gradientMove {
    0% { background-position:0% 50%; }
    50% { background-position:100% 50%; }
    100% { background-position:0% 50%; }
}

/* ===== FLOATING BUBBLES ===== */
.bg-animation span {
    position:absolute;
    display:block;
    border-radius:50%;
    background: rgba(255,255,255,0.08);
    animation: float 12s linear infinite;
}

/* different sizes */
.bg-animation span:nth-child(1){
    width:200px;
    height:200px;
    left:10%;
    animation-duration:15s;
}

.bg-animation span:nth-child(2){
    width:300px;
    height:300px;
    left:70%;
    animation-duration:20s;
}

.bg-animation span:nth-child(3){
    width:150px;
    height:150px;
    left:40%;
    animation-duration:12s;
}

/* movement */
@keyframes float {
    0% { top:100%; transform:translateY(0) rotate(0deg); }
    100% { top:-200px; transform:translateY(-1000px) rotate(360deg); }
}

/* ===== GLASS CARD ===== */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:16px;
    width:320px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    text-align:center;
    transform: perspective(1000px) rotateX(0deg);
    transition: 0.4s;
    color:white;
}

.card:hover {
    transform: perspective(1000px) rotateX(5deg) scale(1.03);
}

h2 { margin-bottom:20px; }

input {
    width:80%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    outline:none;
}

/* button */
button {
    width:100%;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    background:#312e81;
}
</style>

</head>

<body>

<!-- 🔥 ADD THIS (BACKGROUND ANIMATION) -->
<div class="bg-animation">
  <span></span>
  <span></span>
  <span></span>
</div>

<!-- LOGIN CARD -->
<div class="card">
<h2>Assessment Portal</h2>

<input id="id" placeholder="Employee ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>
<script src="script.js"></script>

</body>
</html>
