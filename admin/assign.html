<!DOCTYPE html>
<html>
<head>
  <title>Assign</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>Admin</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="manage_questions.html">Questions</a>
  <a href="assign.html">Assign</a>
  <a href="results.html">Results</a>
</div>

<div class="main">

<h1>Assign Assessment</h1>

<div class="card">
<select id="emp"></select>
<select id="topic"></select>
<input id="duration" placeholder="Duration">
<select id="status">
  <option>Open</option>
  <option>Closed</option>
</select>
<button onclick="assign()">Assign</button>
</div>

<table>
<thead>
<tr>
<th>Employee</th>
<th>Topic</th>
<th>Duration</th>
<th>Status</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>
</div>

<script>
function assign(){
 fetch('/api/assign',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body: JSON.stringify({
     employee_id: emp.value,
     topic_id: topic.value,
     duration: duration.value,
     status: status.value
   })
 }).then(()=>load());
}

function load(){
 fetch('/api/assignments')
 .then(r=>r.json())
 .then(d=>{
   data.innerHTML='';
   d.data.forEach(a=>{
     data.innerHTML+=`
     <tr>
       <td>${a.employee}</td>
       <td>${a.topic}</td>
       <td>${a.duration}</td>
       <td>${a.is_open?'OPEN':'CLOSED'}</td>
     </tr>`;
   });
 });
}

load();
</script>

</body>
</html>
