<!DOCTYPE html>

<html>
<head>
  <title>Assign Assessment</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<div class="sidebar">
  <h2>Admin</h2>

<a href="dashboard.html">Dashboard</a> <a href="manage_questions.html">Questions</a> <a href="assign.html" class="active">Assign</a> <a href="results.html">Results</a> <a href="#" onclick="logout()">Logout</a>

</div>

<div class="main">

<h1>Assign Assessment</h1>

<div class="form-box">

<label>Employee</label> <select id="employee"></select>

<label>Topic</label> <select id="topic"></select>

<label>Duration (Minutes)</label> <input
 type="number"
 id="duration"
 min="1"
 placeholder="Duration">

  <button onclick="assignAssessment()">
    Assign Assessment
  </button>

</div>

</div>

<script>

const employeeSelect =
  document.getElementById('employee');

const topicSelect =
  document.getElementById('topic');


// ======================
// LOAD EMPLOYEES
// ======================

async function loadEmployees() {

  try {

    const response =
      await fetch(
        '/api?action=get_employees'
      );

    const data =
      await response.json();

    employeeSelect.innerHTML =
      '<option value="">Select Employee</option>';

    data.forEach(emp => {

      employeeSelect.innerHTML += `
        <option value="${emp.employee_id}">
          ${emp.name}
          (${emp.employee_id})
        </option>
      `;

    });

  } catch (err) {

    console.error(err);

    alert('Failed to load employees');

  }
}


// ======================
// LOAD TOPICS
// ======================

async function loadTopics() {

  try {

    const response =
      await fetch(
        '/api?action=topics'
      );

    const data =
      await response.json();

    topicSelect.innerHTML =
      '<option value="">Select Topic</option>';

    data.forEach(topic => {

      topicSelect.innerHTML += `
        <option value="${topic.id}">
          ${topic.topic_name}
        </option>
      `;

    });

  } catch (err) {

    console.error(err);

    alert('Failed to load topics');

  }
}


// ======================
// ASSIGN
// ======================

async function assignAssessment() {

  const employee_id =
    employeeSelect.value;

  const topic_id =
    Number(topicSelect.value);

  const duration =
    Number(
      document.getElementById(
        'duration'
      ).value
    );

  if (!employee_id) {

    alert('Select employee');

    return;
  }

  if (!topic_id) {

    alert('Select topic');

    return;
  }

  if (!duration || duration <= 0) {

    alert('Enter valid duration');

    return;
  }

  try {

    const response =
      await fetch(
        '/api?action=assign',
        {
          method: 'POST',

          headers: {
            'Content-Type':
            'application/json'
          },

          body: JSON.stringify({
            employee_id,
            topic_id,
            duration,
            is_open: true
          })
        }
      );

    const result =
      await response.json();

    if (result.success === false) {

      alert(
        result.message ||
        'Assignment failed'
      );

      return;
    }

    alert(
      'Assessment assigned successfully'
    );

  } catch (err) {

    console.error(err);

    alert(
      'Assignment failed'
    );

  }
}


// ======================
// LOGOUT
// ======================

function logout() {

  localStorage.clear();

  window.location.href =
    '../login.html';
}


// ======================
// INIT
// ======================

window.onload = () => {

  loadEmployees();

  loadTopics();

};

</script>

</body>
</html>
