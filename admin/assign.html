<!DOCTYPE html>
<html>
<head>
  <title>Assign Assessment</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="sidebar">
  <h2>Admin</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="questions.html">Questions</a>
  <a href="assign.html" class="active">Assign</a>
  <a href="results.html">Results</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<h1>Assign Assessment</h1>

<div class="form-box">
  <select id="employee"></select>
  <select id="topic"></select>
  <input type="number" id="duration" placeholder="Duration (minutes)">
  <select id="status">
    <option value="true">Open</option>
    <option value="false">Closed</option>
  </select>
  <button onclick="assign()">Assign</button>
</div>

<table>
  <thead>
    <tr>
      <th>Employee</th>
      <th>Topic</th>
      <th>Duration</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

</div>

<script>
function logout(){
  localStorage.clear();
  window.location.href = "../login.html";
}

// Load dropdowns
fetch('/api/get_employees')
.then(r=>r.json())
.then(d=>{
  employee.innerHTML = d.map(e=>`<option value="${e.employee_id}">${e.name}</option>`).join('');
});

fetch('/api/get_admin_topics')
.then(r=>r.json())
.then(d=>{
  topic.innerHTML = d.map(t=>`<option value="${t.id}">${t.topic_name}</option>`).join('');
});

// Assign
function assign(){
  fetch('/api/assign',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      employee_id: employee.value,
      topic_id: topic.value,
      duration: duration.value,
      is_open: status.value === "true"
    })
  })
  .then(r=>r.json())
  .then(()=>{
    alert("Assigned!");
    load();
  });
}

// Load table
function load(){
  fetch('/api/get_assignments')
  .then(r=>r.json())
  .then(d=>{
    list.innerHTML = d.map(a=>`
      <tr>
        <td>${a.employee}</td>
        <td>${a.topic}</td>
        <td>${a.duration}</td>
        <td>${a.is_open ? 'OPEN' : 'CLOSED'}</td>
      </tr>
    `).join('');
  });
}

load();
</script>

</body>
</html>
