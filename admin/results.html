<!DOCTYPE html>
<html>
<head>
  <title>Results</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<div class="sidebar">
  <h2>Admin</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="manage_questions.html">Questions</a>
  <a href="assign.html">Assign</a>
  <a href="results.html" class="active">Results</a>
</div>

<div class="main">

<h1>Results</h1>

<table>
<thead>
<tr>
<th>Score</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>

<script>

function load(){
  fetch('/api?action=dashboard')
  .then(r=>r.json())
  .then(d=>{
    data.innerHTML = `
      <tr>
        <td>Total Attempts: ${d.attempts}</td>
      </tr>
    `;
  });
}

load();

</script>
