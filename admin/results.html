<!DOCTYPE html>

<html>
<head>
  <title>Assessment Results</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<div class="sidebar">
  <h2>Admin</h2>

<a href="dashboard.html">Dashboard</a> <a href="manage_questions.html">Questions</a> <a href="assign.html">Assign</a> <a href="results.html" class="active">Results</a> <a href="#" onclick="logout()">Logout</a>

</div>

<div class="main">

  <h1>Assessment Results</h1>

  <div class="card">

```
<table width="100%">

  <thead>
    <tr>
      <th>Employee ID</th>
      <th>Topic ID</th>
      <th>Score</th>
      <th>Time Taken</th>
      <th>Attempt Date</th>
    </tr>
  </thead>

  <tbody id="resultTable">
    <tr>
      <td colspan="5">Loading...</td>
    </tr>
  </tbody>

</table>
```

  </div>

</div>

<script>

const resultTable =
  document.getElementById('resultTable');


// ======================
// LOAD RESULTS
// ======================

async function loadResults() {

  try {

    const response =
      await fetch(
        '/api?action=get_results'
      );

    const data =
      await response.json();

    resultTable.innerHTML = '';

    if (
      !Array.isArray(data) ||
      data.length === 0
    ) {

      resultTable.innerHTML = `
        <tr>
          <td colspan="5">
            No results found
          </td>
        </tr>
      `;

      return;
    }

    data.forEach(result => {

      resultTable.innerHTML += `
        <tr>

          <td>
            ${result.employee_id || '-'}
          </td>

          <td>
            ${result.topic_id || '-'}
          </td>

          <td>
            ${result.score || 0}
          </td>

          <td>
            ${result.time_taken || 0}
          </td>

          <td>
            ${result.attempt_date || '-'}
          </td>

        </tr>
      `;

    });

  } catch (err) {

    console.error(
      'Results Error:',
      err
    );

    resultTable.innerHTML = `
      <tr>
        <td colspan="5">
          Failed to load results
        </td>
      </tr>
    `;

  }
}


// ======================
// LOGOUT
// ======================

function logout() {

  localStorage.clear();

  window.location.href =
    '../login.html';

}


// ======================
// INIT
// ======================

window.onload =
  loadResults;

</script>

</body>
</html>
