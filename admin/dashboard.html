<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<div class="sidebar">
  <h2>Admin</h2>
  <a href="dashboard.html" class="active">Dashboard</a>
  <a href="manage_questions.html">Questions</a>
  <a href="assign.html">Assign</a>
  <a href="results.html">Results</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">
  <h1>Analytics Dashboard</h1>

  <div class="cards">
    <div class="card">Topics <h2 id="topics">0</h2></div>
    <div class="card">Avg Score <h2 id="avg">0%</h2></div>
    <div class="card">Users <h2 id="users">0</h2></div>
    <div class="card">Attempts <h2 id="attempts">0</h2></div>
  </div>

  <div class="charts">
    <div class="chart-box">Topic Performance</div>
    <div class="chart-box">Score Trend</div>
  </div>

</div>

<script>
function logout(){
  localStorage.clear();
  window.location.href = "../login.html";
}

fetch('/api/get_assignments')
.then(r=>r.json())
.then(d=>{
  document.getElementById('topics').innerText = d.topics || 0;
  document.getElementById('users').innerText = d.users || 0;
  document.getElementById('attempts').innerText = d.attempts || 0;
  document.getElementById('avg').innerText = d.avg || "0%";
});
</script>

</body>
</html>
