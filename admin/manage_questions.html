<!DOCTYPE html>
<html>
<head>
  <title>Manage Questions</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>Admin</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="manage_questions.html" class="active">Questions</a>
  <a href="assign.html">Assign</a>
  <a href="results.html">Results</a>
</div>

<div class="main">

<h1>Manage Questions</h1>

<select id="topic"></select>
<button onclick="loadQuestions()">Load</button>

<table>
<thead>
<tr>
<th>Question</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>
</div>

<script>

// LOAD TOPICS
function loadTopics() {
  fetch('/api?action=topics')
    .then(res => res.json())
    .then(data => {
      const t = document.getElementById('topic');
      t.innerHTML = '<option value="">Select Topic</option>';

      data.forEach(x => {
        t.innerHTML += `<option value="${x.topic_name}">${x.topic_name}</option>`;
      });
    });
}


// LOAD QUESTIONS
function loadQuestions() {
  const topic = document.getElementById('topic').value;

  fetch(`/api?action=get_assessment&topic=${topic}`)
    .then(res => res.json())
    .then(data => {

      const table = document.getElementById('table');
      table.innerHTML = '';

      data.questions.forEach(q => {
        table.innerHTML += `
          <tr>
            <td>${q.question}</td>
          </tr>
        `;
      });

    });
}

loadTopics();

</script>

</body>
</html>
