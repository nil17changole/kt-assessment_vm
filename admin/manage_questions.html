<!DOCTYPE html>

<html>
<head>
  <title>Manage Questions</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>Admin</h2>

<a href="dashboard.html">Dashboard</a> <a href="manage_questions.html" class="active">Questions</a> <a href="assign.html">Assign</a> <a href="results.html">Results</a> <a href="#" onclick="logout()">Logout</a>

</div>

<div class="main">

<h1>Manage Questions</h1>

<label>Select Topic</label> <select id="topic"></select>

<button onclick="loadQuestions()">
  Load Questions
</button>

<hr>

<h3>Add New Question</h3>

<input id="q" placeholder="Question"><br> <input id="a" placeholder="Option A"><br> <input id="b" placeholder="Option B"><br> <input id="c" placeholder="Option C"><br> <input id="d" placeholder="Option D"><br> <input id="correct" placeholder="Correct Option (A/B/C/D)"><br>

<button onclick="addQuestion()">
  Add Question
</button>

<hr>

<table>

<thead>
<tr>
  <th>Question</th>
  <th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>
</div>

<script>

let currentTopicId = null;


// =======================
// LOAD TOPICS
// =======================

async function loadTopics() {

  try {

    const response =
      await fetch('/api?action=topics');

    const data =
      await response.json();

    topic.innerHTML = '';

    data.forEach(t => {

      topic.innerHTML += `
        <option value="${t.id}">
          ${t.topic_name}
        </option>
      `;

    });

  } catch (err) {

    console.error(err);

    alert('Failed to load topics');

  }
}


// =======================
// LOAD QUESTIONS
// =======================

async function loadQuestions() {

  currentTopicId =
    Number(topic.value);

  if (!currentTopicId) {

    alert('Select topic');

    return;
  }

  try {

    const response =
      await fetch(
        '/api?action=get_questions',
        {
          method: 'POST',

          headers: {
            'Content-Type':
            'application/json'
          },

          body: JSON.stringify({
            topic_id:
              currentTopicId
          })
        }
      );

    const data =
      await response.json();

    const table =
      document.getElementById('table');

    table.innerHTML = '';

    data.forEach(question => {

      table.innerHTML += `
        <tr>

          <td>
            <input
              value="${question.question}"
              id="q${question.id}">
          </td>

          <td>

            <button
              onclick="updateQuestion(${question.id})">
              Save
            </button>

            <button
              onclick="deleteQuestion(${question.id})">
              Delete
            </button>

          </td>

        </tr>
      `;

    });

  } catch (err) {

    console.error(err);

    alert(
      'Failed to load questions'
    );

  }
}


// =======================
// ADD QUESTION
// =======================

async function addQuestion() {

  currentTopicId =
    Number(topic.value);

  if (!currentTopicId) {

    alert('Select topic');

    return;
  }

  try {

    const response =
      await fetch(
        '/api?action=add_question',
        {
          method: 'POST',

          headers: {
            'Content-Type':
            'application/json'
          },

          body: JSON.stringify({

            topic_id:
              currentTopicId,

            question:
              q.value,

            option_a:
              a.value,

            option_b:
              b.value,

            option_c:
              c.value,

            option_d:
              d.value,

            correct_option:
              correct.value
                .trim()
                .toUpperCase()

          })
        }
      );

    const result =
      await response.json();

    if (
      result.success === false
    ) {
      alert(
        result.message ||
        'Failed'
      );
      return;
    }

    alert('Question added');

    q.value = '';
    a.value = '';
    b.value = '';
    c.value = '';
    d.value = '';
    correct.value = '';

    loadQuestions();

  } catch (err) {

    console.error(err);

    alert(
      'Failed to add question'
    );

  }
}


// =======================
// UPDATE QUESTION
// =======================

async function updateQuestion(id) {

  const question =
    document.getElementById(
      `q${id}`
    ).value;

  try {

    const response =
      await fetch(
        '/api?action=update_question',
        {
          method: 'POST',

          headers: {
            'Content-Type':
            'application/json'
          },

          body: JSON.stringify({
            id,
            question
          })
        }
      );

    const result =
      await response.json();

    if (
      result.success === false
    ) {
      alert(
        result.message ||
        'Failed'
      );
      return;
    }

    alert('Question updated');

  } catch (err) {

    console.error(err);

    alert(
      'Update failed'
    );

  }
}


// =======================
// DELETE QUESTION
// =======================

async function deleteQuestion(id) {

  if (
    !confirm(
      'Delete question?'
    )
  ) return;

  try {

    const response =
      await fetch(
        '/api?action=delete_question',
        {
          method: 'POST',

          headers: {
            'Content-Type':
            'application/json'
          },

          body: JSON.stringify({
            id
          })
        }
      );

    const result =
      await response.json();

    if (
      result.success === false
    ) {
      alert(
        result.message ||
        'Failed'
      );
      return;
    }

    loadQuestions();

  } catch (err) {

    console.error(err);

    alert(
      'Delete failed'
    );

  }
}


// =======================
// LOGOUT
// =======================

function logout() {

  localStorage.clear();

  window.location.href =
    '../login.html';

}


// =======================
// INIT
// =======================

window.onload =
  loadTopics;

</script>

</body>
</html>
