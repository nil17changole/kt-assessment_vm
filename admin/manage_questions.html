<!DOCTYPE html>
<html>
<head>
  <title>Manage Questions</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>Admin</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="manage_questions.html">Questions</a>
  <a href="assign.html">Assign</a>
  <a href="results.html">Results</a>
</div>

<div class="main">

<h1>Manage Questions</h1>

<select id="topic"></select>
<button onclick="load()">Load</button>

<table>
<thead>
<tr>
<th>Question</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>
</div>

<script>
function load(){
  fetch('/api/questions',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({topic_id:topic.value})
  })
  .then(r=>r.json())
  .then(d=>{
    table.innerHTML='';
    d.data.forEach(q=>{
      table.innerHTML += `
      <tr>
        <td>${q.question}</td>
        <td>
          <button>Edit</button>
          <button onclick="del(${q.id})">Delete</button>
        </td>
      </tr>`;
    });
  });
}

function del(id){
  fetch('/api/questions',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'delete', id})
  }).then(()=>load());
}
</script>

</body>
</html>
