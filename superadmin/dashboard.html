<!DOCTYPE html>
<html>
<head>
  <title>Superadmin Dashboard</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Super Admin</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="manage_users.html">Users</a>
    <a href="manage_topics.html">Topics</a>
    <a href="upload_questions.html">Upload Questions</a>
    <a href="manage_permissions.html">Permissions</a>
    <a href="../logout.html">Logout</a>
  </div>

  <!-- Main -->
  <div class="main">

    <h1>Dashboard</h1>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h3>Users</h3>
        <p id="users">0</p>
      </div>

      <div class="card">
        <h3>Topics</h3>
        <p id="topics">0</p>
      </div>

      <div class="card">
        <h3>Questions</h3>
        <p id="questions">0</p>
      </div>

      <div class="card">
        <h3>Attempts</h3>
        <p id="attempts">0</p>
      </div>
    </div>

  </div>
</div>

<script>
fetch('/api/dashboard')
.then(res => res.json())
.then(data => {
  document.getElementById('users').innerText = data.users || 0;
  document.getElementById('topics').innerText = data.topics || 0;
  document.getElementById('questions').innerText = data.questions || 0;
  document.getElementById('attempts').innerText = data.attempts || 0;
});
</script>

</body>
</html>
