<!DOCTYPE html>
<html>
<head>
  <title>Upload Questions</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>Super Admin</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="manage_users.html">Users</a>
    <a href="manage_topics.html">Topics</a>
    <a href="upload_questions.html">Upload Questions</a>
    <a href="manage_permissions.html">Permissions</a>
    <a href="../login.html">Logout</a>
  </div>

  <div class="main">

    <h1>Upload Questions (CSV)</h1>

    <div class="card">
      <input id="topic" placeholder="Topic Name"><br><br>
      <input type="file" id="file"><br><br>
      <button onclick="uploadCSV()">Upload</button>
    </div>

  </div>

</div>

<script>
async function uploadCSV() {
  const file = document.querySelector("input[type=file]").files[0];
  const topic = document.querySelector("input").value;

  if (!file) return alert("Select file");

  const text = await file.text();
  const rows = text.split("\n").slice(1); // skip header

  const questions = rows
    .filter(r => r.trim() !== "")
    .map(r => {
      const cols = r.split(",");

      return {
        question: cols[0],
        option_a: cols[1],
        option_b: cols[2],
        option_c: cols[3],
        option_d: cols[4],
        correct_option: cols[5]
      };
    });

  console.log("Parsed Questions:", questions);

  fetch('/api?action=upload_questions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ topic, questions })
  })
  .then(async r => {
    const data = await r.json();

    if (!r.ok) throw new Error(data.error);

    alert("Uploaded successfully");
  })
  .catch(err => {
    alert("Error: " + err.message);
    console.error(err);
  });
}
</script>

</body>
</html>
