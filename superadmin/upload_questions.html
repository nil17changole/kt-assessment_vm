```
<h1>Upload Questions (CSV)</h1>

<div class="card">

  <label>Select Topic</label>

  <select id="topic">
    <option value="">
      Loading Topics...
    </option>
  </select>

  <br><br>

  <input
    type="file"
    id="file"
    accept=".csv">

  <br><br>

  <button onclick="uploadCSV()">
    Upload CSV
  </button>

</div>
```

  </div>

</div>

<script>

const topicSelect =
  document.getElementById('topic');


// =====================
// LOAD TOPICS
// =====================

async function loadTopics() {

  try {

    const response =
      await fetch('/api?action=topics');

    const data =
      await response.json();

    topicSelect.innerHTML =
      '<option value="">Select Topic</option>';

    data.forEach(topic => {

      topicSelect.innerHTML += `
        <option value="${topic.id}">
          ${topic.topic_name}
        </option>
      `;

    });

  } catch (err) {

    console.error(err);

    alert('Failed to load topics');

  }
}


// =====================
// UPLOAD CSV
// =====================

async function uploadCSV() {

  const topic_id =
    topicSelect.value;

  const file =
    document.getElementById('file')
      .files[0];

  if (!topic_id) {

    alert('Select topic');

    return;
  }

  if (!file) {

    alert('Select CSV file');

    return;
  }

  const text =
    await file.text();

  const rows =
    text.split('\n').slice(1);

  const questions = rows

    .filter(row => row.trim())

    .map(row => {

      const cols =
        row.split(',');

      return {

        question:
          cols[0]?.trim(),

        option_a:
          cols[1]?.trim(),

        option_b:
          cols[2]?.trim(),

        option_c:
          cols[3]?.trim(),

        option_d:
          cols[4]?.trim(),

        correct_option:
          cols[5]
            ?.trim()
            ?.toUpperCase()

      };

    });

  try {

    const response =
      await fetch(
        '/api?action=upload_questions',
        {
          method: 'POST',

          headers: {
            'Content-Type':
            'application/json'
          },

          body: JSON.stringify({
            topic_id,
            questions
          })
        }
      );

    const result =
      await response.json();

    if (result.success === false) {

      alert(
        result.message ||
        'Upload failed'
      );

      return;
    }

    alert(
      'Questions uploaded successfully'
    );

    document.getElementById(
      'file'
    ).value = '';

  } catch (err) {

    console.error(err);

    alert('Upload failed');

  }
}


// =====================
// INIT
// =====================

window.onload = loadTopics;

</script>

</body>
</html>
