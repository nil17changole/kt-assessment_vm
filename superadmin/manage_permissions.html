<!DOCTYPE html>

<html>
<head>
  <title>Assign Topic</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<div class="container">

  <div class="sidebar">

  <div class="main">

```
<h1>Assign Topic to Admin</h1>

<div class="card">

  <label>Admin</label>
  <select id="admin"></select>

  <label>Topic</label>
  <select id="topic"></select>

  <button onclick="assignPermission()">
    Assign Topic
  </button>

</div>
```

  </div>

</div>

<script>

const adminSelect =
  document.getElementById('admin');

const topicSelect =
  document.getElementById('topic');


// =====================
// LOAD ADMINS
// =====================

async function loadAdmins() {

  try {

    const response =
      await fetch('/api?action=get_admins');

    const data =
      await response.json();

    adminSelect.innerHTML =
      '<option value="">Select Admin</option>';

    data.forEach(admin => {

      adminSelect.innerHTML += `
        <option value="${admin.id}">
          ${admin.name}
          (${admin.employee_id})
        </option>
      `;

    });

  } catch (err) {

    console.error(err);

    alert('Failed to load admins');

  }
}


// =====================
// LOAD TOPICS
// =====================

async function loadTopics() {

  try {

    const response =
      await fetch('/api?action=topics');

    const data =
      await response.json();

    topicSelect.innerHTML =
      '<option value="">Select Topic</option>';

    data.forEach(topic => {

      topicSelect.innerHTML += `
        <option value="${topic.id}">
          ${topic.topic_name}
        </option>
      `;

    });

  } catch (err) {

    console.error(err);

    alert('Failed to load topics');

  }
}


// =====================
// ASSIGN TOPIC
// =====================

async function assignPermission() {

  if (
    !adminSelect.value ||
    !topicSelect.value
  ) {
    alert(
      'Select admin and topic'
    );
    return;
  }

  try {

    const response =
      await fetch(
        '/api?action=assign_topic',
        {
          method: 'POST',

          headers: {
            'Content-Type':
            'application/json'
          },

          body: JSON.stringify({
            admin_id:
              Number(adminSelect.value),

            topic_id:
              Number(topicSelect.value)
          })
        }
      );

    const result =
      await response.json();

    if (result.success === false) {

      alert(
        result.message ||
        'Assignment failed'
      );

      return;
    }

    alert(
      'Topic assigned successfully'
    );

  } catch (err) {

    console.error(err);

    alert(
      'Assignment failed'
    );

  }
}


// =====================
// INIT
// =====================

window.onload = () => {

  loadAdmins();

  loadTopics();

};

</script>

</body>
</html>
