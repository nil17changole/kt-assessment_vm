<!DOCTYPE html>
<html>
<head>
  <title>Assign Topic</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>Super Admin</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="manage_users.html">Users</a>
    <a href="manage_topics.html">Topics</a>
    <a href="upload_questions.html">Upload Questions</a>
    <a href="manage_permissions.html">Permissions</a>
    <a href="../login.html">Logout</a>
  </div>

  <div class="main">

    <h1>Assign Topic to Admin</h1>

    <div class="card">

      <label>Admin</label><br>
      <select id="admin"></select><br><br>

      <label>Topic</label><br>
      <select id="topic"></select><br><br>

      <button onclick="assign()">Assign</button>

    </div>

  </div>

</div>

<script>
function loadData(){
  fetch('/api?action=users',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'getAdmins'})
  })
  .then(r=>r.json())
  .then(d=>{
    d.data.forEach(u=>{
      admin.innerHTML += `<option value="${u.employee_id}">${u.name}</option>`;
    });
  });

  fetch('/api?action=topics',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'getTopics'})
  })
  .then(r=>r.json())
  .then(d=>{
    d.data.forEach(t=>{
      topic.innerHTML += `<option value="${t.id}">${t.topic_name}</option>`;
    });
  });
}

function assign(){
  fetch('/api?action=assign',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      admin_id: admin.value,
      topic_id: topic.value
    })
  }).then(()=>alert('Assigned'));
}

loadData();
</script
