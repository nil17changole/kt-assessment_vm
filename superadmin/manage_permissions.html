<!DOCTYPE html>
<html>
<head>
  <title>Assign Topic</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>Super Admin</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="manage_users.html">Users</a>
    <a href="manage_topics.html">Topics</a>
    <a href="upload_questions.html">Upload Questions</a>
    <a href="manage_permissions.html" class="active">Permissions</a>
    <a href="../login.html">Logout</a>
  </div>

  <div class="main">

    <h1>Assign Topic to Admin</h1>

    <div class="card">

      <label>Admin</label>
      <select id="admin"></select>

      <label>Topic</label>
      <select id="topic"></select>

      <button onclick="assignPermission()">Assign</button>

    </div>

  </div>

</div>

<script>

// ================= LOAD ADMINS =================
function loadAdmins() {
  fetch('/api?action=get_admins')
    .then(res => res.json())
    .then(data => {

      const adminSelect = document.getElementById('admin');
      adminSelect.innerHTML = '<option value="">Select Admin</option>';

      data.forEach(u => {
        adminSelect.innerHTML += `
          <option value="${u.id}">
            ${u.name} (${u.employee_id})
          </option>
        `;
      });

    })
    .catch(err => {
      console.error("Admin Load Error:", err);
      alert("Failed to load admins");
    });
}


// ================= LOAD TOPICS =================
function loadTopics() {
  fetch('/api?action=get_topics')
    .then(res => res.json())
    .then(data => {

      const topicSelect = document.getElementById('topic');
      topicSelect.innerHTML = '<option value="">Select Topic</option>';

      data.forEach(t => {
        topicSelect.innerHTML += `
          <option value="${t.id}">
            ${t.topic_name}
          </option>
        `;
      });

    })
    .catch(err => {
      console.error("Topic Load Error:", err);
      alert("Failed to load topics");
    });
}


// ================= ASSIGN =================
function assignPermission() {
  const admin_id = document.getElementById('admin').value;
  const topic_id = document.getElementById('topic').value;

  if (!admin_id || !topic_id) {
    alert("Please select both Admin and Topic");
    return;
  }

  fetch('/api?action=assign_permission', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      admin_id,
      topic_id
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("Assigned successfully");
  })
  .catch(err => {
    console.error("Assign Error:", err);
    alert("Assignment failed");
  });
}


// ================= INIT =================
window.onload = () => {
  loadAdmins();
  loadTopics();
};

</script>

</body>
</html>
