<!DOCTYPE html>
<html>
<head>
  <title>Assign Topic</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>Super Admin</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="manage_users.html">Users</a>
    <a href="manage_topics.html">Topics</a>
    <a href="upload_questions.html">Upload Questions</a>
    <a href="manage_permissions.html" class="active">Permissions</a>
    <a href="../login.html">Logout</a>
  </div>

  <div class="main">

    <h1>Assign Topic to Admin</h1>

    <div class="card">

      <label>Admin</label>
      <select id="admin"></select>

      <label>Topic</label>
      <select id="topic"></select>

      <button onclick="assignPermission()">Assign</button>

    </div>

  </div>

</div>

<script>
const adminSelect = document.getElementById("admin");
const topicSelect = document.getElementById("topic");

// LOAD ADMINS
function loadAdmins() {
  fetch('/api?action=get_admins')
    .then(res => res.json())
    .then(data => {
      adminSelect.innerHTML = '<option value="">Select Admin</option>';

      data.forEach(a => {
        adminSelect.innerHTML += `
          <option value="${a.employee_id}">
            ${a.name}
          </option>`;
      });
    })
    .catch(err => {
      console.error("Admin Load Error:", err);
      alert("Failed to load admins");
    });
}

// LOAD TOPICS
function loadTopics() {
  fetch('/api?action=topics') // ✅ GET (NO BODY)
    .then(res => res.json())
    .then(data => {
      topicSelect.innerHTML = '<option value="">Select Topic</option>';

      data.forEach(t => {
        topicSelect.innerHTML += `
          <option value="${t.id}">
            ${t.topic_name}
          </option>`;
      });
    })
    .catch(err => {
      console.error("Topic Load Error:", err);
      alert("Failed to load topics");
    });
}

// ASSIGN TOPIC
function assign() {
  if (!adminSelect.value || !topicSelect.value) {
    alert("Select admin and topic");
    return;
  }

  fetch('/api?action=assign_topic', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      admin_id: adminSelect.value,
      topic_id: topicSelect.value
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("Assigned successfully");
  })
  .catch(err => {
    console.error("Assign Error:", err);
    alert("Assignment failed");
  });
}

// INIT
window.onload = () => {
  loadAdmins();
  loadTopics();
};
</script>

</body>
</html>
