<script>

// ================= LOAD USERS =================
function loadUsers() {
  fetch('/api?action=get_users')   // ✅ FIX
    .then(res => res.json())
    .then(data => {

      const table = document.getElementById('userTable');
      table.innerHTML = '';

      data.forEach(user => {
        table.innerHTML += `
          <tr>
            <td>${user.emp_id}</td>
            <td>${user.name}</td>
            <td>${user.role}</td>
            <td>
              <button onclick="deleteUser('${user.emp_id}')">Delete</button>
            </td>
          </tr>
        `;
      });

    })
    .catch(err => {
      console.error("Load Users Error:", err);
      alert("Failed to load users");
    });
}


// ================= ADD USER =================
function addUser() {
  const emp_id = document.getElementById('empId').value.trim();
  const name = document.getElementById('name').value.trim();
  const password = document.getElementById('password').value.trim();
  const role = document.getElementById('role').value;

  if (!emp_id || !name || !password) {
    alert("All fields required");
    return;
  }

  fetch('/api?action=add_user', {   // ✅ FIX
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ emp_id, name, password, role }) // ✅ FIX
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message || "User added");
    loadUsers();
  })
  .catch(err => {
    console.error("Add User Error:", err);
    alert("Failed to add user");
  });
}

function deleteUser(emp_id) {

  alert("Delete not implemented in backend yet"); // ⚠️ honest handling

}


// ================= INITIAL LOAD =================
loadUsers();

</script>
