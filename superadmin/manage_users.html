<h1>Manage Users</h1>

<!-- Add User -->
<div class="card">

  <h3>Add User</h3>

  <label>Employee ID</label>
  <input id="empId" placeholder="Enter Employee ID">

  <label>Name</label>
  <input id="name" placeholder="Enter Name">

  </div>

<script>

// ===========================
// LOAD USERS
// ===========================

async function loadUsers() {

  try {

    const response =
      await fetch('/api?action=get_users');

    const data =
      await response.json();

    const table =
      document.getElementById('userTable');

    table.innerHTML = '';

    if (!Array.isArray(data)) {
      table.innerHTML =
        '<tr><td colspan="4">No users found</td></tr>';
      return;
    }

    data.forEach(user => {

      table.innerHTML += `
        <tr>
          <td>${user.employee_id || '-'}</td>
          <td>${user.name || '-'}</td>
          <td>${user.role || '-'}</td>
          <td>
            <button
              class="danger"
              onclick="deleteUser('${user.employee_id}')">
              Delete
            </button>
          </td>
        </tr>
      `;

    });

  } catch (err) {

    console.error(err);

    alert('Failed to load users');

  }
}


// ===========================
// ADD USER
// ===========================

async function addUser() {

  const employee_id =
    document.getElementById('empId').value.trim();

  const name =
    document.getElementById('name').value.trim();

  const password =
    document.getElementById('password').value.trim();

  const role =
    document.getElementById('role').value;

  if (
    !employee_id ||
    !name ||
    !password
  ) {
    alert('All fields are required');
    return;
  }

  try {

    const response = await fetch(
      '/api?action=add_user',
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          employee_id,
          name,
          password,
          role
        })
      }
    );

    const result =
      await response.json();

    if (result.success === false) {
      alert(result.message || 'Failed');
      return;
    }

    alert('User added successfully');

    document.getElementById('empId').value = '';
    document.getElementById('name').value = '';
    document.getElementById('password').value = '';

    loadUsers();

  } catch (err) {

    console.error(err);

    alert('Failed to add user');

  }
}


// ===========================
// DELETE USER
// ===========================

async function deleteUser(employee_id) {

  const ok = confirm(
    `Delete user ${employee_id}?`
  );

  if (!ok) return;

  try {

    const response = await fetch(
      '/api?action=delete_user',
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          employee_id
        })
      }
    );

    const result =
      await response.json();

    if (result.success === false) {
      alert(result.message || 'Delete failed');
      return;
    }

    alert('User deleted successfully');

    loadUsers();

  } catch (err) {

    console.error(err);

    alert('Failed to delete user');

  }
}


// ===========================
// PAGE INIT
// ===========================

window.onload = function () {
  loadUsers();
};

</script>
