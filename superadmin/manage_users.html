<!DOCTYPE html>
<html>
<head>
  <title>Manage Users</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Super Admin</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="manage_users.html" class="active">Users</a>
    <a href="manage_topics.html">Topics</a>
    <a href="upload_questions.html">Upload Questions</a>
    <a href="manage_permissions.html">Permissions</a>
    <a href="../login.html">Logout</a>
  </div>

  <!-- Main -->
  <div class="main">

    <h1>Manage Users</h1>

    <!-- Add User -->
    <div class="card">
      <h3>Add User</h3>

      <label>Employee ID</label>
      <input id="empId" placeholder="Enter Employee ID">

      <label>Name</label>
      <input id="name" placeholder="Enter Name">

      <label>Password</label>
      <input id="password" type="password" placeholder="Enter Password">

      <label>Role</label>
      <select id="role">
        <option value="EMPLOYEE">EMPLOYEE</option>
        <option value="ADMIN">ADMIN</option>
        <option value="SUPERADMIN">SUPERADMIN</option>
      </select>

      <button onclick="addUser()">Add User</button>
    </div>

    <!-- Table -->
    <div class="card">
      <h3>All Users</h3>

      <table>
        <thead>
          <tr>
            <th>Emp ID</th>
            <th>Name</th>
            <th>Role</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="userTable"></tbody>
      </table>
    </div>

  </div>
</div>

<script>

// LOAD USERS
function loadUsers() {
  fetch('/api?action=get_users')
    .then(res => res.json())
    .then(data => {

      const table = document.getElementById('userTable');
      table.innerHTML = '';

      data.forEach(user => {
        table.innerHTML += `
          <tr>
            <td>${user.employee_id || '-'}</td>
            <td>${user.name}</td>
            <td>${user.role}</td>
            <td>
              <button class="danger">Delete</button>
            </td>
          </tr>
        `;
      });

    })
    .catch(err => {
      console.error("Load Users Error:", err);
      alert("Failed to load users");
    });
}


// ADD USER
function addUser() {
  const emp_id = document.getElementById('empId').value.trim();
  const name = document.getElementById('name').value.trim();
  const password = document.getElementById('password').value.trim();
  const role = document.getElementById('role').value;

  if (!emp_id || !name || !password) {
    alert("All fields required");
    return;
  }

  fetch('/api?action=add_user', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ emp_id, name, password, role })
  })
  .then(res => res.json())
  .then(data => {
    alert("User added");

    document.getElementById('empId').value = '';
    document.getElementById('name').value = '';
    document.getElementById('password').value = '';

    loadUsers();
  })
  .catch(err => {
    console.error(err);
    alert("Failed to add user");
  });
}


// INIT
window.onload = loadUsers;

</script>

</body>
</html>
