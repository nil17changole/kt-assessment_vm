<h1>Manage Topics</h1>

<div class="card">

  <h3>Add Topic</h3>

  <div style="display:flex; gap:10px;">

    <input
      id="topicName"
      placeholder="Enter Topic Name"
      style="flex:1;">

    <button onclick="addTopic()">
      Add Topic
    </button>

  </div>

</div>

<div class="card">

  <h3>All Topics</h3>

  <table width="100%">

    <thead>

```

  </div>

<script>

const topicTable =
  document.getElementById('topicTable');


// =====================
// LOAD TOPICS
// =====================

async function loadTopics() {

  try {

    const response =
      await fetch('/api?action=topics');

    const data =
      await response.json();

    topicTable.innerHTML = '';

    if (!Array.isArray(data)) {

      topicTable.innerHTML =
        '<tr><td colspan="2">No topics found</td></tr>';

      return;
    }

    data.forEach(topic => {

      topicTable.innerHTML += `
        <tr>
          <td>${topic.id}</td>
          <td>${topic.topic_name}</td>
        </tr>
      `;

    });

  } catch (err) {

    console.error(err);

    alert('Failed to load topics');

  }
}


// =====================
// ADD TOPIC
// =====================

async function addTopic() {

  const topic_name =
    document
      .getElementById('topicName')
      .value
      .trim();

  if (!topic_name) {

    alert('Enter topic name');

    return;
  }

  try {

    const response =
      await fetch('/api?action=add_topic', {

        method: 'POST',

        headers: {
          'Content-Type': 'application/json'
        },

        body: JSON.stringify({
          topic_name
        })

      });

    const result =
      await response.json();

    if (result.success === false) {

      alert(
        result.message ||
        'Failed to add topic'
      );

      return;
    }

    alert('Topic added successfully');

    document.getElementById(
      'topicName'
    ).value = '';

    loadTopics();

  } catch (err) {

    console.error(err);

    alert('Failed to add topic');

  }
}


// =====================
// INIT
// =====================

window.onload = loadTopics;

</script>

</body>
