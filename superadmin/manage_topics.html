<script>
function loadTopics() {
  fetch('/api?action=topics')   // ✅ GET request
    .then(r => r.json())
    .then(data => {
      topicTable.innerHTML = '';

      if (!Array.isArray(data)) {
        console.error("Invalid response:", data);
        return;
      }

      data.forEach(t => {
        topicTable.innerHTML += `
          <tr>
            <td>${t.id}</td>
            <td>${t.topic || t.name || '-'}</td>
          </tr>
        `;
      });
    })
    .catch(err => console.error(err));
}

function addTopic(){
  const topic = document.getElementById('topicName').value;

  fetch('/api?action=add_topic', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ topic })
  })
  .then(r => r.json())
  .then(() => {
    document.getElementById('topicName').value = '';
    loadTopics();
  })
  .catch(err => console.error(err));
}

loadTopics();
</script>
